<!DOCTYPE html>
<html class="light" lang="zh-TW">

<head>
    <link rel="stylesheet" href="design-tokens.css">
    <link rel="stylesheet" href="css/vibe-style.css">

    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="考試神器" />
    <meta name="theme-color" content="#000000" />
    <title>考試神器 - 重設密碼</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="js/theme-config.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />

    <style>
        .btn-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #000;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .field-error {
            border-color: var(--color-danger) !important;
            box-shadow: 4px 4px 0px 0px var(--color-danger) !important;
        }
        .field-success {
            border-color: var(--color-success) !important;
            box-shadow: 4px 4px 0px 0px var(--color-success) !important;
        }
        .strength-bar {
            height: 6px;
            border: 2px solid #000;
            border-radius: 4px;
            overflow: hidden;
            background: #e5e5e5;
        }
        .strength-fill {
            height: 100%;
            transition: width 0.3s ease, background-color 0.3s ease;
            width: 0%;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-start p-6">
    <!-- Header -->
    <header class="w-full max-w-md flex flex-col items-center mb-6 pt-4">
        <div class="flex items-center justify-center bg-white dark:bg-black border-[3px] border-black p-4 neo-shadow w-20 h-20 mb-4 rounded-xl">
            <span class="material-symbols-outlined text-4xl font-bold text-black dark:text-white">lock_reset</span>
        </div>
        <h1 class="text-3xl font-bold tracking-tighter text-black dark:text-white uppercase mb-2">重設密碼</h1>
    </header>

    <main class="w-full max-w-md pb-12">

        <!-- 載入中狀態 -->
        <div id="state-loading" class="text-center py-12">
            <div class="btn-spinner mx-auto mb-4" style="width:40px;height:40px;border-width:4px;"></div>
            <p class="text-lg font-bold text-black dark:text-white">驗證中...</p>
        </div>

        <!-- 錯誤狀態 -->
        <div id="state-error" class="hidden">
            <div class="bg-white dark:bg-zinc-900 border-[3px] border-black neo-shadow rounded-xl p-6 text-center">
                <span class="material-symbols-outlined text-5xl text-red-500 mb-4">error</span>
                <h2 class="text-xl font-bold text-black dark:text-white mb-2">連結無效或已過期</h2>
                <p id="error-message" class="text-sm font-bold text-zinc-500 mb-6">請重新發送密碼重設信件。</p>
                <a href="login-page.html"
                   class="inline-block bg-primary text-black border-[3px] border-black py-3 px-8 text-lg font-bold uppercase neo-shadow rounded-xl active:shadow-none active:translate-x-[2px] active:translate-y-[2px] transition-all">
                    返回登入頁
                </a>
            </div>
        </div>

        <!-- 重設密碼表單 -->
        <div id="state-form" class="hidden space-y-4">
            <div class="bg-white dark:bg-zinc-900 border-[3px] border-black neo-shadow rounded-xl p-6">
                <p class="text-sm font-bold text-zinc-500 mb-4">請輸入你的新密碼：</p>

                <section class="mb-4">
                    <div class="relative">
                        <input
                            class="w-full bg-white text-black border-[3px] border-black p-4 pr-14 text-lg font-bold neo-shadow focus:ring-0 focus:outline-none placeholder:text-zinc-500 rounded-xl transition-all"
                            id="new-password" placeholder="新密碼" type="password"
                            oninput="validateNewPassword()" />
                        <button type="button" onclick="togglePasswordVisibility('new-password', this)"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-black transition-colors"
                            aria-label="顯示密碼">
                            <span class="material-symbols-outlined text-2xl">visibility_off</span>
                        </button>
                    </div>
                    <div class="mt-2 ml-1">
                        <div class="strength-bar">
                            <div id="strength-fill" class="strength-fill"></div>
                        </div>
                        <p id="password-hint" class="text-sm font-bold mt-1 text-zinc-500">密碼至少需要 6 個字元</p>
                    </div>
                </section>

                <section class="mb-6">
                    <div class="relative">
                        <input
                            class="w-full bg-white text-black border-[3px] border-black p-4 pr-14 text-lg font-bold neo-shadow focus:ring-0 focus:outline-none placeholder:text-zinc-500 rounded-xl transition-all"
                            id="confirm-password" placeholder="再次輸入新密碼" type="password"
                            oninput="validateConfirmPassword()"
                            onkeydown="if(event.key==='Enter') handleResetPassword()" />
                        <button type="button" onclick="togglePasswordVisibility('confirm-password', this)"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-black transition-colors"
                            aria-label="顯示密碼">
                            <span class="material-symbols-outlined text-2xl">visibility_off</span>
                        </button>
                    </div>
                    <p id="confirm-hint" class="text-sm font-bold mt-2 ml-1 hidden"></p>
                </section>

                <button onclick="handleResetPassword()" id="reset-btn"
                    class="w-full bg-primary text-black border-[3px] border-black py-4 px-8 text-xl font-bold uppercase neo-shadow rounded-xl flex items-center justify-center gap-2 active:shadow-none active:translate-x-[2px] active:translate-y-[2px] transition-all disabled:opacity-60">
                    <span id="reset-btn-text">確認重設密碼</span>
                    <span id="reset-btn-icon" class="material-symbols-outlined font-black">check</span>
                </button>
            </div>
        </div>

        <!-- 成功狀態 -->
        <div id="state-success" class="hidden">
            <div class="bg-white dark:bg-zinc-900 border-[3px] border-black neo-shadow rounded-xl p-6 text-center">
                <span class="material-symbols-outlined text-5xl text-green-500 mb-4">check_circle</span>
                <h2 class="text-xl font-bold text-black dark:text-white mb-2">密碼已重設成功！</h2>
                <p class="text-sm font-bold text-zinc-500 mb-6">請使用新密碼登入。</p>
                <a href="login-page.html"
                   class="inline-block bg-primary text-black border-[3px] border-black py-3 px-8 text-lg font-bold uppercase neo-shadow rounded-xl active:shadow-none active:translate-x-[2px] active:translate-y-[2px] transition-all">
                    前往登入
                </a>
            </div>
        </div>

        <!-- Footer -->
        <p class="mt-6 text-xs text-zinc-500 dark:text-zinc-400 font-bold text-center" data-brand="footer">
            考試神器
        </p>
    </main>

    <!-- 背景裝飾 -->
    <div class="fixed top-10 left-10 -z-10 opacity-10 dark:opacity-5 pointer-events-none">
        <div class="w-32 h-32 border-4 border-black dark:border-white rotate-12"></div>
    </div>
    <div class="fixed bottom-10 right-10 -z-10 opacity-10 dark:opacity-5 pointer-events-none">
        <div class="w-24 h-24 bg-primary border-4 border-black -rotate-12 neo-shadow"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/modal-system.js"></script>

    <script>
        // ==================== 狀態切換 ====================
        function showState(state) {
            ['loading', 'error', 'form', 'success'].forEach(s => {
                document.getElementById('state-' + s).classList.toggle('hidden', s !== state);
            });
        }

        // ==================== 密碼可見性切換 ====================
        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }

        // ==================== 即時驗證 ====================
        function validateNewPassword() {
            const val = document.getElementById('new-password').value;
            const hint = document.getElementById('password-hint');
            const fill = document.getElementById('strength-fill');
            const input = document.getElementById('new-password');

            input.classList.remove('field-error', 'field-success');

            if (!val) {
                hint.textContent = '密碼至少需要 6 個字元';
                hint.className = 'text-sm font-bold mt-1 text-zinc-500';
                fill.style.width = '0%';
                fill.style.backgroundColor = '';
                return;
            }

            let score = 0;
            if (val.length >= 6) score++;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
            if (/\d/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            if (val.length < 6) {
                hint.textContent = '密碼至少需要 6 個字元';
                hint.className = 'text-sm font-bold mt-1';
                hint.style.color = 'var(--color-danger)';
                input.classList.add('field-error');
                fill.style.width = '15%';
                fill.style.backgroundColor = 'var(--color-danger)';
            } else if (score <= 2) {
                hint.textContent = '密碼強度：弱';
                hint.className = 'text-sm font-bold mt-1';
                hint.style.color = '#f59e0b';
                fill.style.width = '40%';
                fill.style.backgroundColor = '#f59e0b';
                input.classList.add('field-success');
            } else if (score <= 3) {
                hint.textContent = '密碼強度：中';
                hint.className = 'text-sm font-bold mt-1';
                hint.style.color = '#f59e0b';
                fill.style.width = '70%';
                fill.style.backgroundColor = '#f59e0b';
                input.classList.add('field-success');
            } else {
                hint.textContent = '密碼強度：強';
                hint.className = 'text-sm font-bold mt-1';
                hint.style.color = 'var(--color-success)';
                fill.style.width = '100%';
                fill.style.backgroundColor = 'var(--color-success)';
                input.classList.add('field-success');
            }

            const confirmVal = document.getElementById('confirm-password').value;
            if (confirmVal) validateConfirmPassword();
        }

        function validateConfirmPassword() {
            const pw = document.getElementById('new-password').value;
            const cpw = document.getElementById('confirm-password').value;
            const hint = document.getElementById('confirm-hint');
            const input = document.getElementById('confirm-password');

            input.classList.remove('field-error', 'field-success');
            hint.classList.remove('hidden');

            if (!cpw) {
                hint.classList.add('hidden');
                return;
            }
            if (cpw !== pw) {
                input.classList.add('field-error');
                hint.className = 'text-sm font-bold mt-2 ml-1';
                hint.style.color = 'var(--color-danger)';
                hint.textContent = '密碼不一致';
            } else {
                input.classList.add('field-success');
                hint.className = 'text-sm font-bold mt-2 ml-1';
                hint.style.color = 'var(--color-success)';
                hint.textContent = '密碼一致 ✓';
            }
        }

        // ==================== Loading 狀態 ====================
        function setButtonLoading(loading) {
            const btn = document.getElementById('reset-btn');
            const text = document.getElementById('reset-btn-text');
            const icon = document.getElementById('reset-btn-icon');

            if (loading) {
                btn.disabled = true;
                text.textContent = '處理中';
                icon.outerHTML = '<span id="reset-btn-icon" class="btn-spinner"></span>';
            } else {
                btn.disabled = false;
                text.textContent = '確認重設密碼';
                const spinner = document.getElementById('reset-btn-icon');
                spinner.outerHTML = '<span id="reset-btn-icon" class="material-symbols-outlined font-black">check</span>';
            }
        }

        // ==================== 重設密碼 ====================
        async function handleResetPassword() {
            const password = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (!password) {
                ModalSystem.alert('請輸入密碼', '請輸入新密碼。');
                return;
            }
            if (password.length < 6) {
                ModalSystem.alert('密碼太短', '密碼至少需要 6 個字元！');
                return;
            }
            if (password !== confirmPassword) {
                ModalSystem.alert('密碼不一致', '兩次輸入的密碼不相同，請重新確認！');
                return;
            }

            setButtonLoading(true);

            try {
                const client = getSharedSupabaseClient();
                const { error } = await client.auth.updateUser({ password });

                if (error) throw error;

                showState('success');
            } catch (error) {
                console.error('重設密碼錯誤:', error);
                setButtonLoading(false);

                let msg = error.message || '重設密碼失敗，請重試。';
                if (msg.includes('same as')) msg = '新密碼不能與舊密碼相同，請使用不同的密碼。';

                ModalSystem.alert('重設失敗', msg);
            }
        }

        // ==================== 初始化：解析 URL 並驗證 token ====================
        document.addEventListener('DOMContentLoaded', async () => {
            const client = getSharedSupabaseClient();

            // 載入品牌資訊
            if (typeof OrgBranding !== 'undefined') {
                await OrgBranding.fetch(client);
            }

            // 檢查 URL hash 是否帶有錯誤（Supabase 回傳的錯誤會放在 hash fragment）
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const errorCode = hashParams.get('error_code') || hashParams.get('error');
            const errorDescription = hashParams.get('error_description');

            if (errorCode) {
                let errorMsg = '請重新發送密碼重設信件。';
                if (errorCode === 'otp_expired' || (errorDescription && errorDescription.includes('expired'))) {
                    errorMsg = '重設連結已過期，請返回登入頁重新發送密碼重設信件。';
                } else if (errorCode === 'access_denied') {
                    errorMsg = '連結無效，請返回登入頁重新發送密碼重設信件。';
                }
                document.getElementById('error-message').textContent = errorMsg;
                showState('error');
                return;
            }

            // 監聽 auth 狀態變化，等待 PASSWORD_RECOVERY 事件
            const { data: { subscription } } = client.auth.onAuthStateChange((event, session) => {
                if (event === 'PASSWORD_RECOVERY') {
                    showState('form');
                    document.getElementById('new-password').focus();
                } else if (event === 'SIGNED_IN' && session) {
                    // 有些情況 Supabase 會直接觸發 SIGNED_IN 而非 PASSWORD_RECOVERY
                    // 如果 hash 裡有 type=recovery 則視為密碼重設
                    const type = hashParams.get('type');
                    if (type === 'recovery') {
                        showState('form');
                        document.getElementById('new-password').focus();
                    }
                }
            });

            // 如果 3 秒後仍未收到事件，檢查是否已有 session（可能頁面是重新載入的）
            setTimeout(async () => {
                const loadingEl = document.getElementById('state-loading');
                if (!loadingEl.classList.contains('hidden')) {
                    // 仍在載入中，檢查是否有有效 session
                    const { data: { session } } = await client.auth.getSession();
                    if (session) {
                        showState('form');
                        document.getElementById('new-password').focus();
                    } else {
                        document.getElementById('error-message').textContent = '重設連結無效或已過期，請返回登入頁重新發送。';
                        showState('error');
                    }
                }
            }, 3000);
        });
    </script>
</body>

</html>
